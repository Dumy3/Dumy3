:root {
  color-scheme: dark;
  --bg: #07111f;
  --bg-soft: #101a2b;
  --text: #eef4ff;
  --muted: #90a3bf;
  --primary: #6b7cff;
  --primary-2: #5ed7ff;
  --card: rgba(16, 26, 43, 0.88);
  --border: rgba(255, 255, 255, 0.12);
  --shadow: 0 18px 55px rgba(2, 6, 23, 0.3);
}

body.light {
  color-scheme: light;
  --bg: #f4f7ff;
  --bg-soft: #ffffff;
  --text: #142033;
  --muted: #61708c;
  --primary: #4f5dff;
  --primary-2: #1aa8ff;
  --card: rgba(255, 255, 255, 0.92);
  --border: rgba(15, 27, 45, 0.1);
  --shadow: 0 16px 45px rgba(15, 27, 45, 0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top left, rgba(107, 124, 255, 0.25), transparent 35%), var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 220ms ease, color 220ms ease;
}

button, input, select, textarea {
  font: inherit;
}

img { display: block; max-width: 100%; }

.app-shell {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

.topbar, .card, .hero, .section, .footer, .modal__card {
  background: var(--card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  border-radius: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand h1 { margin: 0; font-size: 1.15rem; }

.brand__mark {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-weight: 800;
  color: white;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
}

.topbar__actions {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.hero {
  margin-top: 24px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 24px;
  padding: 32px;
  border-radius: 30px;
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-size: .75rem;
  font-weight: 700;
  color: var(--primary-2);
}

.hero h2 { margin: 8px 0 12px; font-size: clamp(1.8rem, 3vw, 2.7rem); }

.hero p { margin: 0; color: var(--muted); line-height: 1.65; }

.hero__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}

.hero__card {
  border-radius: 24px;
  padding: 20px;
  background: linear-gradient(135deg, rgba(107, 124, 255, 0.2), rgba(94, 215, 255, 0.12));
  display: grid;
  gap: 12px;
}

.stat {
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
}

.stat strong { display: block; font-size: 1.3rem; }

.section {
  margin-top: 24px;
  padding: 24px;
  border-radius: 28px;
}

.section--soft { background: linear-gradient(135deg, rgba(107,124,255,0.12), rgba(94,215,255,0.08)); }

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.section-head__controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.chips { display: flex; flex-wrap: wrap; gap: 10px; }

.chip {
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
}

.chip.active {
  color: white;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
}

.product-card, .card {
  border: 1px solid var(--border);
  background: var(--bg-soft);
  border-radius: 22px;
}

.product-card { overflow: hidden; }

.product-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.product-card__body { padding: 16px; }

.product-card__meta, .list-item { display: flex; justify-content: space-between; gap: 10px; align-items: center; }

.product-card__body h4, .card h4 { margin: 0 0 8px; }

.product-card__body p, .muted { color: var(--muted); line-height: 1.6; }

.btn {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  transition: transform 160ms ease, opacity 160ms ease;
}

.btn:hover { transform: translateY(-2px); }

.btn--ghost {
  color: var(--text);
  background: transparent;
  border: 1px solid var(--border);
}

.btn--full { width: 100%; }

.stacked-form { display: grid; gap: 10px; }

input, select, textarea {
  width: 100%;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  padding: 11px 12px;
}

textarea { min-height: 84px; resize: vertical; }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}

.admin-panel { display: none; }

.admin-panel.active { display: block; }

.admin-forms {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}

.admin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
}

.card { padding: 16px; }

.list { display: grid; gap: 10px; margin-top: 12px; }

.list-item {
  padding: 10px 12px;
  border-radius: 14px;
  background: var(--bg);
}

.list-item__text { display: flex; flex-direction: column; gap: 3px; }

.contact-card {
  margin: 14px 0;
  padding: 14px;
  border-radius: 16px;
  background: rgba(107,124,255,0.1);
  border: 1px solid var(--border);
}

.contact-list { display: grid; gap: 6px; color: var(--muted); }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(3, 8, 15, 0.72);
  display: grid;
  place-items: center;
  padding: 20px;
  z-index: 20;
}

.modal__card {
  width: min(520px, 100%);
  position: relative;
  border-radius: 24px;
  padding: 24px;
}

.modal__close {
  position: absolute;
  right: 16px;
  top: 12px;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  padding: 12px 16px;
  border-radius: 999px;
  background: var(--primary);
  color: white;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: all 180ms ease;
  z-index: 30;
}

.toast.show { opacity: 1; transform: translateY(0); }

.footer {
  margin-top: 24px;
  padding: 18px 24px;
  border-radius: 22px;
  text-align: center;
  color: var(--muted);
}

.hidden { display: none !important; }

.empty-state { padding: 18px; }

@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .app-shell { padding: 14px; }
  .topbar, .hero, .section, .footer { padding: 16px; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .section-head { flex-direction: column; align-items: flex-start; }
}
